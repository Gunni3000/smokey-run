<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#18223a" />
    <title>Smokey Run!</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Smokey Run game">
      <canvas id="game" width="540" height="960" aria-label="Smokey Run play area"></canvas>
      <section class="controls" aria-label="Game controls">
        <button id="jump-button" class="control-button jump" type="button">
          <span class="control-icon">↑</span>
          <span>Jump</span>
        </button>
      </section>
    </main>
    <script src="/game.js"></script>
  </body>
</html>
